services:
  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: hng-nextcloud
    restart: unless-stopped
    volumes:
      - nextcloud-data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro

  detector:
    build: ./detector
    container_name: hng-detector
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - ./logs:/app/logs
    environment:
      - TZ=UTC

  nginx:
    image: nginx:1.27-alpine
    container_name: hng-nginx
    restart: unless-stopped
    depends_on:
      - nextcloud
      - detector
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  HNG-nginx-logs:
    name: HNG-nginx-logs
  nextcloud-data:
